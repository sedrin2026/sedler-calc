<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CYBER_CALC</title>
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"CYBER CALC","short_name":"電卓","start_url":"./","display":"standalone","background_color":"#000000","theme_color":"#000000"}'>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">

  <style>
    :root {
      --bg: #000000;
      --card-bg: #050811;
      --neon-cyan: #00f3ff;
      --neon-pink: #ff0055;
      --neon-yellow: #ffe600;
      --btn-bg: #111827;
      --btn-border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--neon-cyan);
      font-family: 'Courier New', Consolas, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calc-card {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      height: 100dvh;
      max-height: -webkit-fill-available;
      background: var(--card-bg);
      border: 2px solid var(--neon-cyan);
      display: flex;
      flex-direction: column;
      padding: 4px;
      position: relative;
    }

    /* 情報バー */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--neon-yellow);
      font-weight: bold;
      margin-bottom: 2px;
      flex-shrink: 0;
    }

    /* ディスプレイ領域 */
    .display-panel {
      background: #000000;
      border: 2px solid var(--neon-cyan);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 4px;
      text-align: right;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      position: relative;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 60px;
    }

    .memory-indicator {
      position: absolute;
      top: 2px;
      left: 6px;
      font-size: 0.7rem;
      color: var(--neon-yellow);
      font-weight: bold;
    }

    .expr-line {
      font-size: 0.8rem;
      color: #94a3b8;
      min-height: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: bold;
    }

    #display {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 1.8rem;
      font-weight: 900;
      text-align: right;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.9);
    }

    /* 割引入力エリア */
    .discount-custom-box {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      align-items: center;
      background: #090d16;
      border: 1px solid var(--neon-pink);
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .discount-custom-box label {
      font-size: 0.7rem;
      color: #ffffff;
      font-weight: bold;
      white-space: nowrap;
    }
    #discount-input {
      width: 45px;
      height: 24px;
      background: #000;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-yellow);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: center;
      outline: none;
      font-weight: bold;
      border-radius: 4px;
    }
    .btn-apply-disc {
      flex: 1;
      height: 24px;
      background: var(--neon-pink);
      color: #ffffff;
      border: none;
      font-size: 0.8rem;
      font-weight: 900;
      cursor: pointer;
      border-radius: 4px;
    }

    /* メインボタンエリア */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 3px;
      flex: 1;
      min-height: 0;
    }

    button {
      background: var(--btn-bg);
      color: #ffffff;
      border: 1.5px solid var(--btn-border);
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.05s;
      height: 100%;
      width: 100%;
    }

    button:active {
      background: var(--neon-cyan);
      color: #000000;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .btn-op {
      color: var(--neon-yellow) !important;
      border-color: var(--neon-yellow) !important;
      font-size: 1.4rem !important;
      background: #171805;
    }

    .btn-action {
      background: var(--neon-pink) !important;
      color: #ffffff !important;
      border-color: #ff3377 !important;
      font-size: 1.3rem !important;
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
    }

    .btn-mem {
      color: #c084fc;
      border-color: #7e22ce;
      font-size: 0.9rem;
      background: #12091f;
    }
    .btn-clear {
      color: var(--neon-pink);
      border-color: var(--neon-pink);
      font-size: 1.1rem;
      background: #1c050e;
    }

    /* 履歴スライドパネル */
    .history-drawer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0;
      background: #000000;
      border-top: 3px solid var(--neon-cyan);
      transition: height 0.25s ease;
      overflow-y: auto;
      z-index: 10;
      padding: 0 12px;
    }
    .history-drawer.open {
      height: 70%;
      padding: 16px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #334155;
      padding-bottom: 8px;
      margin-bottom: 12px;
      font-size: 1.1rem;
      color: var(--neon-yellow);
      font-weight: bold;
    }
    .history-close {
      background: transparent;
      border: none;
      color: var(--neon-pink);
      font-size: 1.4rem;
      cursor: pointer;
      font-weight: bold;
    }
    .history-list {
      font-size: 1.1rem;
      color: #ffffff;
      line-height: 1.8;
      font-weight: bold;
    }
    .history-item {
      border-bottom: 1px dashed #334155;
      padding: 6px 0;
    }

    .toggle-history-btn {
      background: #1e293b;
      color: var(--neon-cyan);
      font-size: 0.7rem;
      border: 1px solid var(--neon-cyan);
      padding: 2px 6px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="calc-card">
  <div class="status-bar">
    <span id="clock" style="font-size: 0.7rem; color: var(--neon-cyan);">0000.00.00 (---) 00:00:00</span>
    <button class="toggle-history-btn" onclick="toggleHistory()">履歴 📂</button>
  </div>

  <div class="display-panel">
    <div class="memory-indicator" id="mem-indicator"></div>
    <div class="expr-line" id="expr">READY</div>
    <input type="text" id="display" readonly value="0">
  </div>

  <div class="discount-custom-box">
    <label>割引(0-85%):</label>
    <input type="number" id="discount-input" min="0" max="85" value="10">
    <button class="btn-apply-disc" onclick="applyCustomDiscount()">%OFF 実行</button>
  </div>

  <div class="grid">
    <button class="btn-mem" onclick="memClear()">mc</button>
    <button class="btn-mem" onclick="memPlus()">m+</button>
    <button class="btn-mem" onclick="memMinus()">m-</button>
    <button class="btn-mem" onclick="memRecall()">mr</button>

    <button class="btn-clear" onclick="clearDisplay()">C</button>
    <button class="btn-op" onclick="append('%')">％</button>
    <button class="btn-op" onclick="append('del')" title="1文字削除">⌫</button>
    <button class="btn-op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="btn-op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="btn-op" onclick="append('-')">－</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="btn-op" onclick="append('+')">＋</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('00')">00</button>
    <button onclick="append('000')">000</button>
    <button onclick="append('.')">.</button>

    <button onclick="calculate()" class="btn-action" style="grid-column: span 4;">＝ (CALCULATE)</button>
  </div>

  <div class="history-drawer" id="historyDrawer">
    <div class="history-header">
      <span>// 計算履歴</span>
      <button class="history-close" onclick="toggleHistory()">✖ 閉じる</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item">履歴はありません</div>
    </div>
  </div>
</div>

<script>
  // オフライン化：外部ファイル sw.js を登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js?v=9').catch(() => {});
  }

  function updateClock() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    const dayName = days[now.getDay()];
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${y}.${m}.${d} (${dayName}) ${hh}:${mm}:${ss}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  const display = document.getElementById('display');
  const expr = document.getElementById('expr');
  let isNew = true;
  let memory = 0;
  let historyArr = [];

  function append(val) {
    if (val === 'del') {
      deleteChar();
      return;
    }
    if (display.value === '0' || isNew) {
      if (['+', '*', '/', '%'].includes(val)) return;
      display.value = val;
      isNew = false;
    } else {
      display.value += val;
    }
    expr.textContent = display.value;
  }

  function deleteChar() {
    if (display.value.length > 1) {
      display.value = display.value.slice(0, -1);
    } else {
      display.value = '0';
      isNew = true;
    }
    expr.textContent = display.value;
  }

  function clearDisplay() {
    display.value = '0';
    expr.textContent = 'READY';
    isNew = true;
  }

  function updateMemoryIndicator() {
    document.getElementById('mem-indicator').textContent = memory !== 0 ? '[M]' : '';
  }
  function memClear() { memory = 0; updateMemoryIndicator(); }
  function memPlus() { memory += parseFloat(display.value) || 0; updateMemoryIndicator(); isNew = true; }
  function memMinus() { memory -= parseFloat(display.value) || 0; updateMemoryIndicator(); isNew = true; }
  function memRecall() { display.value = memory; expr.textContent = `MEM(${memory})`; isNew = true; }

  function applyCustomDiscount() {
    let rateInput = parseInt(document.getElementById('discount-input').value);
    if (isNaN(rateInput) || rateInput < 0) rateInput = 0;
    if (rateInput > 85) rateInput = 85;
    document.getElementById('discount-input').value = rateInput;

    try {
      let current = parseFloat(display.value);
      if (!isNaN(current)) {
        let multiplier = (100 - rateInput) / 100;
        let result = Math.floor(current * multiplier);
        let formula = `${current} × ${100 - rateInput}% (${rateInput}%OFF)`;
        expr.textContent = formula;
        display.value = result;
        addHistory(formula + ` = ${result}`);
        isNew = true;
      }
    } catch (e) { display.value = 'ERR'; }
  }

  function calculate() {
    try {
      let rawExpr = display.value.replace(/%/g, '/100');
      let fullExpr = display.value;
      let res = Function('"use strict";return (' + rawExpr + ')')();
      
      expr.textContent = fullExpr + ' =';
      display.value = res;
      addHistory(fullExpr + ` = ${res}`);
      isNew = true;
    } catch (e) {
      display.value = 'ERR';
      expr.textContent = 'ERROR';
      isNew = true;
    }
  }

  function addHistory(text) {
    historyArr.unshift(text);
    if (historyArr.length > 20) historyArr.pop();
    let listHtml = historyArr.map(item => `<div class="history-item">${item}</div>`).join('');
    document.getElementById('historyList').innerHTML = listHtml;
  }

  function toggleHistory() {
    document.getElementById('historyDrawer').classList.toggle('open');
  }
</script>

</body>
</html>
