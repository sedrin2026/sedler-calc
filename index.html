<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER_CALC // SEDLER ZERO PRO</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #030712;
      --card-bg: #060913;
      --neon-cyan: #00f3ff;
      --neon-pink: #ff0055;
      --neon-yellow: #ffe600;
      --text: #00f3ff;
      --btn-bg: #0f172a;
      --btn-border: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

    /* 画面全体にジャストフィット（フルスクリーン感覚） */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Consolas, monospace;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
      background-size: 15px 15px;
    }

    .calc-card {
      width: 100vw;
      height: 100vh;
      max-width: 480px;
      max-height: 100vh;
      background: var(--card-bg);
      border: 1px solid var(--neon-cyan);
      display: flex;
      flex-direction: column;
      padding: 12px;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--neon-yellow);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .title-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--neon-pink);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .title-box h1 {
      font-size: 1rem;
      color: var(--neon-cyan);
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(0, 243, 255, 0.6);
    }
    .tag {
      background: var(--neon-pink);
      color: #fff;
      font-size: 0.55rem;
      padding: 1px 4px;
      font-weight: bold;
    }

    /* 日時・曜日表示 */
    .clock-box {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .clock-val { color: var(--neon-cyan); }

    /* ディスプレイ（計算過程 ＆ メモリ状態 ＆ 数値） */
    .display-panel {
      background: #000;
      border: 1px solid var(--neon-pink);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 8px;
      text-align: right;
      box-shadow: inset 0 0 10px rgba(255, 0, 85, 0.15);
      position: relative;
      flex-shrink: 0;
    }
    .memory-indicator {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 0.6rem;
      color: var(--neon-yellow);
    }
    .expr-line {
      font-size: 0.75rem;
      color: #475569;
      height: 18px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #display {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--neon-cyan);
      font-family: inherit;
      font-size: 2rem;
      font-weight: bold;
      text-align: right;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
    }

    /* 自由入力式カスタム割引エリア (0〜85入力対応) */
    .discount-custom-box {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      align-items: center;
      background: #0f172a;
      border: 1px dashed var(--neon-cyan);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .discount-custom-box label {
      font-size: 0.65rem;
      color: var(--neon-yellow);
      white-space: nowrap;
    }
    #discount-input {
      width: 50px;
      background: #000;
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink);
      font-family: inherit;
      font-size: 0.9rem;
      text-align: center;
      padding: 2px;
      outline: none;
      font-weight: bold;
    }
    .btn-apply-disc {
      flex: 1;
      height: 28px;
      background: var(--neon-pink);
      color: #fff;
      border: none;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
    }

    /* ボタン配置グリッド（ジャストフィット拡大） */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      flex: 1;
      padding-bottom: 4px;
    }

    button {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.1s;
    }

    button:active {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .btn-op { color: var(--neon-yellow); border-color: rgba(255, 230, 0, 0.3); }
    .btn-action { background: var(--neon-pink); color: #fff; border-color: var(--neon-pink); }
    .btn-mem { color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); font-size: 0.85rem; }
    .btn-clear { color: var(--neon-pink); border-color: rgba(255, 0, 85, 0.3); }

    /* スライド式計算履歴ドロワー */
    .history-drawer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0;
      background: #020617;
      border-top: 2px solid var(--neon-cyan);
      transition: height 0.3s ease;
      overflow-y: auto;
      z-index: 10;
      padding: 0 12px;
    }
    .history-drawer.open {
      height: 60%;
      padding: 12px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 6px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--neon-yellow);
    }
    .history-close {
      background: transparent;
      border: none;
      color: var(--neon-pink);
      font-size: 1rem;
      cursor: pointer;
    }
    .history-list {
      font-size: 0.75rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .history-item {
      border-bottom: 1px dashed #1e293b;
      padding: 4px 0;
    }

    .toggle-history-btn {
      background: #1e293b;
      color: var(--neon-cyan);
      font-size: 0.65rem;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<div class="calc-card">
  <div class="status-bar">
    <span>[SYS: ACTIVE]</span>
    <button class="toggle-history-btn" onclick="toggleHistory()">履歴スライド 📂</button>
  </div>

  <div class="title-box">
    <h1>SEDLER_ZERO</h1>
    <span class="tag">PRO v2</span>
  </div>

  <div class="clock-box">
    <span>TIME: <span class="clock-val" id="clock">0000.00.00 (---) 00:00:00</span></span>
  </div>

  <!-- ディスプレイ -->
  <div class="display-panel">
    <div class="memory-indicator" id="mem-indicator"></div>
    <div class="expr-line" id="expr">SYS.READY</div>
    <input type="text" id="display" readonly value="0">
  </div>

  <!-- 0〜85まで自由に入力できる割引カスタムエリア -->
  <div class="discount-custom-box">
    <label>割引設定(0-85):</label>
    <input type="number" id="discount-input" min="0" max="85" value="10">
    <span style="font-size:0.65rem; color:var(--neon-cyan);">%OFF</span>
    <button class="btn-apply-disc" onclick="applyCustomDiscount()">適用</button>
  </div>

  <!-- ボタンレイアウト -->
  <div class="grid">
    <!-- メモリ・機能系 -->
    <button class="btn-mem" onclick="memClear()">mc</button>
    <button class="btn-mem" onclick="memPlus()">m+</button>
    <button class="btn-mem" onclick="memMinus()">m-</button>
    <button class="btn-mem" onclick="memRecall()">mr</button>

    <button class="btn-clear" onclick="clearDisplay()">C</button>
    <button class="btn-op" onclick="append('%')">％</button>
    <button class="btn-op" onclick="deleteChar()" title="1文字削除">⌫</button>
    <button class="btn-op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="btn-op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="btn-op" onclick="append('-')">-</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="btn-op" onclick="append('+')">+</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('00')">00</button>
    <button onclick="append('000')">000</button>
    <button onclick="append('.')">.</button>

    <button onclick="calculate()" class="btn-action" style="grid-column: span 4; height: 45px;">＝ 実行 (CALCULATE)</button>
  </div>

  <!-- 計算履歴スライドパネル -->
  <div class="history-drawer" id="historyDrawer">
    <div class="history-header">
      <span>// 過去の計算履歴</span>
      <button class="history-close" onclick="toggleHistory()">✖ 閉じる</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item">履歴はありません</div>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  // 時計・曜日表示
  function updateClock() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    const dayName = days[now.getDay()];
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${y}.${m}.${d} (${dayName}) ${hh}:${mm}:${ss}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  const display = document.getElementById('display');
  const expr = document.getElementById('expr');
  let isNew = true;
  let memory = 0;
  let historyArr = [];

  function append(val) {
    if (display.value === '0' || isNew) {
      if (['+', '*', '/', '%'].includes(val)) return;
      display.value = val;
      isNew = false;
    } else {
      display.value += val;
    }
    expr.textContent = display.value;
  }

  function deleteChar() {
    if (display.value.length > 1) {
      display.value = display.value.slice(0, -1);
    } else {
      display.value = '0';
      isNew = true;
    }
    expr.textContent = display.value;
  }

  function clearDisplay() {
    display.value = '0';
    expr.textContent = 'SYS.READY';
    isNew = true;
  }

  // メモリ機能
  function updateMemoryIndicator() {
    document.getElementById('mem-indicator').textContent = memory !== 0 ? '[M]' : '';
  }
  function memClear() { memory = 0; updateMemoryIndicator(); }
  function memPlus() { memory += parseFloat(display.value) || 0; updateMemoryIndicator(); isNew = true; }
  function memMinus() { memory -= parseFloat(display.value) || 0; updateMemoryIndicator(); isNew = true; }
  function memRecall() { display.value = memory; expr.textContent = `MEM(${memory})`; isNew = true; }

  // 自由入力割引（0〜85%）
  function applyCustomDiscount() {
    let rateInput = parseInt(document.getElementById('discount-input').value);
    if (isNaN(rateInput) || rateInput < 0) rateInput = 0;
    if (rateInput > 85) rateInput = 85; // 最大85まで
    document.getElementById('discount-input').value = rateInput;

    try {
      let current = parseFloat(display.value);
      if (!isNaN(current)) {
        let multiplier = (100 - rateInput) / 100;
        let result = Math.floor(current * multiplier);
        let formula = `${current} × ${100 - rateInput}% (${rateInput}%OFF)`;
        expr.textContent = formula;
        display.value = result;
        addHistory(formula + ` = ${result}`);
        isNew = true;
      }
    } catch (e) { display.value = 'ERR'; }
  }

  // 計算実行
  function calculate() {
    try {
      let rawExpr = display.value.replace(/%/g, '/100');
      let fullExpr = display.value;
      let res = Function('"use strict";return (' + rawExpr + ')')();
      
      expr.textContent = fullExpr + ' =';
      display.value = res;
      addHistory(fullExpr + ` = ${res}`);
      isNew = true;
    } catch (e) {
      display.value = 'ERR';
      expr.textContent = 'SYS.ERROR';
      isNew = true;
    }
  }

  // 履歴管理
  function addHistory(text) {
    historyArr.unshift(text);
    if (historyArr.length > 20) historyArr.pop();
    let listHtml = historyArr.map(item => `<div class="history-item">${item}</div>`).join('');
    document.getElementById('historyList').innerHTML = listHtml;
  }

  function toggleHistory() {
    document.getElementById('historyDrawer').classList.toggle('open');
  }
</script>

</body>
</html>
