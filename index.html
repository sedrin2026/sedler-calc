<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CYBER_CALC</title>
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"CYBER CALC","short_name":"電卓","start_url":"./","display":"standalone","background_color":"#000000","theme_color":"#000000"}'>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">

  <!-- デジタル時計風フォント (Orbitron) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #1e293b; 
      --card-bg: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
      --neon-cyan: #00f3ff;
      --neon-deep-blue: #00a2ff; /* ④ 濃いサイバーブルー */
      --neon-pink: #ff0055;
      --neon-yellow: #ffe600;
      --neon-orange: #ff6600;
      --btn-bg: #111827;
      --btn-border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: #0f172a;
      font-family: 'Courier New', Consolas, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calc-card {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      height: 100dvh;
      max-height: -webkit-fill-available;
      background: var(--card-bg);
      border: 2px solid var(--neon-cyan);
      display: flex;
      flex-direction: column;
      padding: 4px;
      position: relative;
    }

    /* 情報バー */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 4px;
      flex-shrink: 0;
    }

    .clock-badge {
      background: #000000;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      box-shadow: 0 0 6px rgba(0, 243, 255, 0.3);
    }

    .top-controls {
      display: flex;
      gap: 4px;
    }

    /* ④ 「展開/格納」「履歴」コントロールボタン：濃いサイバーブルー統一 */
    .btn-control {
      background: #06152d;
      color: var(--neon-deep-blue) !important;
      font-size: 0.7rem;
      border: 1.5px solid var(--neon-deep-blue) !important;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
      box-shadow: 0 0 6px rgba(0, 162, 255, 0.3);
    }

    /* ① 「AC」ボタン：右の「展開」ボタンと完全同サイズ */
    .btn-ac-all {
      background: #1c050e !important;
      color: var(--neon-pink) !important;
      border: 1.5px solid var(--neon-pink) !important;
      font-size: 0.75rem !important;
      font-weight: 900 !important;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 4px;
      min-width: 48px;
      text-align: center;
      box-shadow: 0 0 6px rgba(255, 0, 85, 0.4);
    }

    /* ディスプレイ領域 */
    .display-panel-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 4px;
      flex: 1;
      min-height: 80px;
    }

    .slot-panel {
      background: #00f3ff;
      border: 2px solid #00c8d7;
      border-radius: 6px;
      padding: 2px 8px;
      text-align: right;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.85;
      overflow: hidden;
      max-height: 200px;
    }

    .slot-panel.collapsed {
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      margin-top: -4px !important;
      border: none !important;
      opacity: 0 !important;
      pointer-events: none;
    }

    .slot-panel.active {
      border: 2.5px solid var(--neon-pink) !important;
      background: var(--neon-orange) !important;
      box-shadow: 0 0 12px rgba(255, 0, 85, 0.8);
      opacity: 1;
    }

    .slot-label {
      position: absolute;
      top: 2px;
      left: 6px;
      font-size: 0.65rem;
      color: #000000;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
    }

    .memory-indicator-slot {
      position: absolute;
      top: 2px;
      right: 8px;
      font-size: 0.65rem;
      color: #7e22ce;
      font-weight: bold;
    }

    .expr-line-slot {
      font-size: 0.8rem;
      color: #1e293b;
      min-height: 14px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: bold;
      margin-top: 10px;
    }

    .display-slot-value {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #000000 !important;
      font-family: 'Orbitron', monospace;
      font-size: 2.1rem;
      font-weight: 700;
      text-align: right;
      letter-spacing: 2px;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
    }

    /* 割引入力エリア */
    .discount-custom-box {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      align-items: center;
      background: #0f172a;
      border: 1.5px solid var(--neon-cyan);
      box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .discount-custom-box label {
      font-size: 0.75rem;
      color: #ffffff;
      font-weight: bold;
      white-space: nowrap;
    }
    #discount-input {
      width: 45px;
      height: 24px;
      background: #000;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-yellow);
      font-family: 'Orbitron', monospace;
      font-size: 0.95rem;
      text-align: center;
      outline: none;
      font-weight: bold;
      border-radius: 4px;
    }
    .btn-apply-disc {
      flex: 1;
      height: 24px;
      background: #1a1f2c;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      font-size: 0.8rem;
      font-weight: 900;
      cursor: pointer;
      border-radius: 4px;
    }

    /* メインボタンエリア */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 0.5fr repeat(6, 1fr);
      gap: 3px;
      flex: 2;
      min-height: 0;
    }

    button {
      background: var(--btn-bg);
      color: #ffffff;
      border: 1.5px solid var(--btn-border);
      font-family: 'Orbitron', sans-serif, monospace;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.05s;
      height: 100%;
      width: 100%;
    }

    button:active {
      background: var(--neon-cyan);
      color: #000000;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    /* ④ ％, ., ÷, ×, －, ＋, ⌫ の濃いサイバーブルー化 */
    .btn-op {
      color: var(--neon-deep-blue) !important;
      border-color: var(--neon-deep-blue) !important;
      font-size: 1.7rem !important;
      font-weight: 900 !important;
      background: #06152d !important;
      line-height: 1;
      box-shadow: 0 0 6px rgba(0, 162, 255, 0.2);
    }

    .btn-action {
      background: #1a1f2c !important;
      color: var(--neon-cyan) !important;
      border: 1.5px solid var(--neon-cyan) !important;
      font-size: 2rem !important;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
      grid-column: span 2;
    }

    /* ④ TOTALエリアの濃いサイバーブルー化 */
    .total-box {
      grid-column: span 2;
      background: #06152d;
      border: 1.5px solid var(--neon-deep-blue);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      padding: 0 8px;
      box-shadow: 0 0 8px rgba(0, 162, 255, 0.3);
      position: relative;
    }
    .total-label {
      position: absolute;
      top: 2px;
      left: 6px;
      font-size: 0.6rem;
      color: var(--neon-deep-blue);
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
    }
    .total-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--neon-deep-blue);
      letter-spacing: 1px;
    }

    .btn-mem {
      color: #c084fc;
      border-color: #7e22ce;
      font-size: 0.85rem;
      background: #12091f;
      font-weight: bold;
    }

    .btn-clear {
      color: var(--neon-pink);
      border-color: var(--neon-pink);
      font-size: 1.1rem;
      background: #1c050e;
    }

    /* 履歴スライドパネル */
    .history-drawer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0;
      background: #000000;
      border-top: 3px solid var(--neon-cyan);
      transition: height 0.25s ease;
      overflow-y: auto;
      z-index: 10;
      padding: 0 12px;
    }
    .history-drawer.open {
      height: 70%;
      padding: 16px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #334155;
      padding-bottom: 8px;
      margin-bottom: 12px;
      font-size: 1.1rem;
      color: var(--neon-yellow);
      font-weight: bold;
    }
    .history-close {
      background: transparent;
      border: none;
      color: var(--neon-pink);
      font-size: 1.4rem;
      cursor: pointer;
      font-weight: bold;
    }
    .history-list {
      font-size: 1.1rem;
      color: #ffffff;
      line-height: 1.8;
      font-weight: bold;
    }
    .history-item {
      border-bottom: 1px dashed #334155;
      padding: 6px 0;
    }
  </style>
</head>
<body>

<div class="calc-card">
  <div class="status-bar">
    <!-- ② 秒数を省いた時刻表示 -->
    <div class="clock-badge" id="clock">2026.00.00 (---) 00:00</div>
    <div class="top-controls">
      <!-- ① ACボタン（右と完全同サイズ） -->
      <button class="btn-ac-all" onclick="allClearActive()">AC</button>
      <!-- ④ 濃いサイバーブルー化ボタン -->
      <button class="btn-control" id="btn-toggle-slots" onclick="toggleSlots()">展開 🔽</button>
      <button class="btn-control" onclick="toggleHistory()">履歴 📂</button>
    </div>
  </div>

  <div class="display-panel-container">
    <div class="slot-panel active" id="slot-0" onclick="switchSlot(0)">
      <span class="slot-label">[SLOT 1]</span>
      <span class="memory-indicator-slot" id="mem-0"></span>
      <div class="expr-line-slot" id="expr-0">READY</div>
      <input type="text" class="display-slot-value" id="disp-0" readonly value="0">
    </div>

    <div class="slot-panel collapsed" id="slot-1" onclick="switchSlot(1)">
      <span class="slot-label">[SLOT 2]</span>
      <span class="memory-indicator-slot" id="mem-1"></span>
      <div class="expr-line-slot" id="expr-1">READY</div>
      <input type="text" class="display-slot-value" id="disp-1" readonly value="0">
    </div>

    <div class="slot-panel collapsed" id="slot-2" onclick="switchSlot(2)">
      <span class="slot-label">[SLOT 3]</span>
      <span class="memory-indicator-slot" id="mem-2"></span>
      <div class="expr-line-slot" id="expr-2">READY</div>
      <input type="text" class="display-slot-value" id="disp-2" readonly value="0">
    </div>
  </div>

  <div class="discount-custom-box">
    <!-- ③ 「割引：」に表示を簡略化 -->
    <label>割引：</label>
    <input type="number" id="discount-input" min="0" max="85" value="10">
    <button class="btn-apply-disc" onclick="applyCustomDiscount()">%OFF 実行</button>
  </div>

  <div class="grid">
    <button class="btn-mem" onclick="memClear()">mc</button>
    <button class="btn-mem" onclick="memPlus()">m+</button>
    <button class="btn-mem" onclick="memMinus()">m-</button>
    <button class="btn-mem" onclick="memRecall()">mr</button>

    <button class="btn-clear" onclick="clearDisplay()">C</button>
    <!-- ④ 濃いサイバーブルー化（btn-op） -->
    <button class="btn-op" onclick="append('%')">％</button>
    <button class="btn-op" onclick="append('.')">.</button>
    <button class="btn-op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="btn-op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="btn-op" onclick="append('-')">－</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="btn-op" onclick="append('+')">＋</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('00')">00</button>
    <button onclick="append('000')">000</button>
    <button class="btn-op" onclick="append('del')" title="1文字削除">⌫</button>

    <button onclick="calculate()" class="btn-action">＝</button>
    <!-- ④ 濃いサイバーブルー化（TOTAL） -->
    <div class="total-box">
      <span class="total-label">TOTAL (表示中)</span>
      <span class="total-value" id="total-val">0</span>
    </div>
  </div>

  <div class="history-drawer" id="historyDrawer">
    <div class="history-header">
      <span>// 計算履歴</span>
      <button class="history-close" onclick="toggleHistory()">✖ 閉じる</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item">履歴はありません</div>
    </div>
  </div>
</div>

<script>
  /* おまじない：バージョン v=15 */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js?v=15').catch(() => {});
  }

  /* ② 秒数を抜いた時計処理 */
  function updateClock() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    const dayName = days[now.getDay()];
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${y}.${m}.${d} (${dayName}) ${hh}:${mm}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  let activeSlot = 0;
  let expandedCount = 1; 
  let slots = [
    { value: '0', expr: 'READY', isNew: true, memory: 0 },
    { value: '0', expr: 'READY', isNew: true, memory: 0 },
    { value: '0', expr: 'READY', isNew: true, memory: 0 }
  ];
  let historyArr = [];

  function toggleSlots() {
    if (expandedCount === 1) {
      expandedCount = 2;
    } else if (expandedCount === 2) {
      expandedCount = 3;
    } else {
      expandedCount = 1;
      if (activeSlot > 0) switchSlot(0);
    }
    applySlotVisibility();
  }

  function applySlotVisibility() {
    const btn = document.getElementById('btn-toggle-slots');
    for (let i = 0; i < 3; i++) {
      const panel = document.getElementById(`slot-${i}`);
      if (i < expandedCount) {
        panel.classList.remove('collapsed');
      } else {
        panel.classList.add('collapsed');
      }
    }

    if (expandedCount === 1) {
      btn.textContent = '展開 🔽';
    } else if (expandedCount === 2) {
      btn.textContent = '展開 🔽';
    } else {
      btn.textContent = '格納 🔼';
    }
    calculateTotal();
  }

  function switchSlot(index) {
    activeSlot = index;
    for (let i = 0; i < 3; i++) {
      const panel = document.getElementById(`slot-${i}`);
      if (i === index) {
        panel.classList.add('active');
      } else {
        panel.classList.remove('active');
      }
    }
  }

  function calculateTotal() {
    let sum = 0;
    for (let i = 0; i < expandedCount; i++) {
      let val = parseFloat(slots[i].value);
      if (!isNaN(val)) sum += val;
    }
    document.getElementById('total-val').textContent = sum.toLocaleString('ja-JP');
  }

  function updateView() {
    for (let i = 0; i < 3; i++) {
      document.getElementById(`disp-${i}`).value = slots[i].value;
      document.getElementById(`expr-${i}`).textContent = slots[i].expr;
      document.getElementById(`mem-${i}`).textContent = slots[i].memory !== 0 ? '[M]' : '';
    }
    calculateTotal();
  }

  function append(val) {
    let s = slots[activeSlot];
    if (val === 'del') {
      deleteChar();
      return;
    }
    if (s.value === '0' || s.isNew) {
      if (['+', '*', '/', '%'].includes(val)) return;
      if (val === '.') {
        s.value = '0.';
      } else {
        s.value = val;
      }
      s.isNew = false;
    } else {
      if (val === '.' && s.value.includes('.')) return;
      s.value += val;
    }
    s.expr = s.value;
    updateView();
  }

  function deleteChar() {
    let s = slots[activeSlot];
    if (s.value.length > 1) {
      s.value = s.value.slice(0, -1);
    } else {
      s.value = '0';
      s.isNew = true;
    }
    s.expr = s.value;
    updateView();
  }

  function clearDisplay() {
    let s = slots[activeSlot];
    s.value = '0';
    s.expr = 'READY';
    s.isNew = true;
    updateView();
  }

  function allClearActive() {
    for (let i = 0; i < expandedCount; i++) {
      slots[i].value = '0';
      slots[i].expr = 'READY';
      slots[i].isNew = true;
    }
    updateView();
  }

  function memClear() {
    slots[activeSlot].memory = 0;
    updateView();
  }
  function memPlus() {
    let s = slots[activeSlot];
    s.memory += parseFloat(s.value) || 0;
    s.isNew = true;
    updateView();
  }
  function memMinus() {
    let s = slots[activeSlot];
    s.memory -= parseFloat(s.value) || 0;
    s.isNew = true;
    updateView();
  }
  function memRecall() {
    let s = slots[activeSlot];
    s.value = s.memory;
    s.expr = `MEM(${s.memory})`;
    s.isNew = true;
    updateView();
  }

  function applyCustomDiscount() {
    let s = slots[activeSlot];
    let rateInput = parseInt(document.getElementById('discount-input').value);
    if (isNaN(rateInput) || rateInput < 0) rateInput = 0;
    if (rateInput > 85) rateInput = 85;
    document.getElementById('discount-input').value = rateInput;

    try {
      let current = parseFloat(s.value);
      if (!isNaN(current)) {
        let multiplier = (100 - rateInput) / 100;
        let result = Math.floor(current * multiplier);
        let formula = `[S${activeSlot+1}] ${current} × ${100 - rateInput}% (${rateInput}%OFF)`;
        s.expr = `${current} × ${100 - rateInput}% (${rateInput}%OFF)`;
        s.value = result;
        addHistory(formula + ` = ${result}`);
        s.isNew = true;
        updateView();
      }
    } catch (e) { s.value = 'ERR'; updateView(); }
  }

  function calculate() {
    let s = slots[activeSlot];
    try {
      let rawExpr = s.value.replace(/%/g, '/100');
      let fullExpr = s.value;
      let res = Function('"use strict";return (' + rawExpr + ')')();
      
      s.expr = fullExpr + ' =';
      s.value = res;
      addHistory(`[S${activeSlot+1}] ${fullExpr} = ${res}`);
      s.isNew = true;
      updateView();
    } catch (e) {
      s.value = 'ERR';
      s.expr = 'ERROR';
      s.isNew = true;
      updateView();
    }
  }

  function addHistory(text) {
    historyArr.unshift(text);
    if (historyArr.length > 20) historyArr.pop();
    let listHtml = historyArr.map(item => `<div class="history-item">${item}</div>`).join('');
    document.getElementById('historyList').innerHTML = listHtml;
  }

  function toggleHistory() {
    document.getElementById('historyDrawer').classList.toggle('open');
  }
</script>

</body>
</html>
